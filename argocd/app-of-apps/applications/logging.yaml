# argocd/applications/logging.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # --- Loki (log storage + query) ---
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.22.0
      helm:
        values: |
          # Single-binary mode — perfect for homelab
          deploymentMode: SingleBinary
          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            storage:
              type: filesystem
            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h
            limits_config:
              retention_period: 168h  # 7 days
              max_query_series: 500
          singleBinary:
            replicas: 1
            resources:
              limits:
                memory: 256Mi
                cpu: 250m
              requests:
                memory: 128Mi
                cpu: 50m
            persistence:
              enabled: true
              storageClass: longhorn
              size: 5Gi
          # Disable components not needed in single-binary mode
          gateway:
            enabled: false
          read:
            replicas: 0
          write:
            replicas: 0
          backend:
            replicas: 0
          # Monitoring
          monitoring:
            selfMonitoring:
              enabled: false
            lokiCanary:
              enabled: false
          test:
            enabled: false

    # --- Promtail (log shipper) ---
    - repoURL: https://grafana.github.io/helm-charts
      chart: promtail
      targetRevision: 6.16.6
      helm:
        values: |
          resources:
            limits:
              memory: 128Mi
              cpu: 200m
            requests:
              memory: 64Mi
              cpu: 50m
          config:
            clients:
              - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push
            positions:
              filename: /run/promtail/positions.yaml
            snippets:
              # Add useful labels
              pipelineStages:
                - cri: {}
                - labeldrop:
                    - filename

  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
