# argocd/applications/portfolio-tracker.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-tracker
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # ⚠️ CHANGE THIS to your Git repo URL
    repoURL: https://github.com/YOUR_USERNAME/kube-homelab.git
    targetRevision: main
    path: apps/portfolio-tracker/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio-tracker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
